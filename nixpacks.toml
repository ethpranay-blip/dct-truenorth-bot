# Railway (Nixpacks) build config.
#
# Known-working setup for activating the optional cookie harvester:
#
# 1. apt deps that Chromium needs go in [phases.setup].aptPkgs so they're
#    baked into the system layer (Nixpacks nixPkgs + aptPkgs are the only
#    sanctioned way to install OS libs on Railway).
# 2. PLAYWRIGHT_BROWSERS_PATH points at a path under /app so the downloaded
#    Chromium binary survives the build → runtime filesystem transition.
#    (The default /root/.cache/ms-playwright has bitten deployments where
#    the build user's cache isn't copied into the runtime image.)
# 3. [phases.install] installs Python deps AND downloads Chromium without
#    `--with-deps` — we already installed the apt deps ourselves, and
#    `--with-deps` requires sudo which the build container refuses.
# 4. start.sh is a defensive wrapper that RE-INSTALLS Chromium at boot if
#    the binary is missing (idempotent, ~1 s on warm boots, 30 s on cold
#    recovery). This is the load-bearing safety net.
#
# Memory footprint on Railway:
#   - Base Python + discord.py + deps: ~120 MB idle
#   - Harvester run (Chromium spawned ~25-30 s then exits): peak ~320 MB
#   - Steady-state after harvest: back to ~120 MB
# Minimum Railway instance: 512 MB. Free tier (256 MB) will OOM.

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/.playwright-browsers"

[phases.setup]
aptPkgs = [
  "...",
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libasound2",
  "libpango-1.0-0",
  "libcairo2",
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "PLAYWRIGHT_BROWSERS_PATH=/app/.playwright-browsers python -m playwright install chromium"
]

[start]
cmd = "bash start.sh"
